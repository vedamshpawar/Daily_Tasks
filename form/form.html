<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Data Form</title>
    <link rel="stylesheet" href="../form/form.css">
    <script src="../form/form.js" defer></script>
</head>
<body>

<div class="container">
    <h1>PeoplePro SAMMS Pvt Ltd</h1>
    <h2>Bio-Data Form</h2>

    <form id="bioForm">

        <div class="row">
            <label>Name of Candidate:</label>
            <input type="text" required>
            <label>Mobile:</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Father/Husband Name:</label>
            <input type="text">
            <label>Marital Status:</label>
            <select>
                <option>Married</option>
                <option>Unmarried</option>
            </select>
        </div>

        <div class="row">
            <label>Date of Birth:</label>
            <input type="date">
            <label>Mobile:</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Permanent Address:</label>
            <textarea></textarea>
        </div>

        <div class="row">
            <label>Local Address:</label>
            <textarea></textarea>
        </div>

        <div class="row">
            <label>Religion:</label>
            <input type="text">
            <label>Nationality:</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Languages Known:</label>
            <input type="text" placeholder="Hindi, English, etc">
        </div>

        <div class="row">
            <label>Educational Qualification:</label>
            <select>
                <option>Below 10th</option>
                <option>10th</option>
                <option>12th</option>
                <option>Degree</option>
            </select>
        </div>

        <div class="row">
            <label>Ex-Service:</label>
            <input type="radio" name="ex"> Yes
            <input type="radio" name="ex"> No
        </div>

        <div class="row">
            <label>Previous Experience:</label>
            <textarea></textarea>
        </div>

        <div class="row">
            <label>Blood Group:</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Bank Name:</label>
            <input type="text">
            <label>Branch:</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Aadhar Number:</label>
            <input type="text">
        </div>

        <div class="row">
            <label>Account Number:</label>
            <input type="text">
            <label>IFSC Code:</label>
            <input type="text">
        </div>

        <div class="row">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>
    </form>
</div>

</body>
</html>
